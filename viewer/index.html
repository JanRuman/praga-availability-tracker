<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Availability tracker</title>
    <style>
      :root {
        --bg: #0b0f17;
        --panel: #121a27;
        --text: #e6edf3;
        --muted: #9aa4b2;
        --ok: #1f9d55;
        --bad: #d64545;
        --border: rgba(255, 255, 255, 0.12);
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 20px;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 16px;
        font-size: 13px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 10px;
        align-items: end;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      select,
      input,
      button {
        width: 100%;
        box-sizing: border-box;
        background: #0f1520;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
      }
      button {
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }
      .month {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .monthHeader {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 8px;
        background: rgba(255, 255, 255, 0.04);
      }
      .monthHeader .title {
        font-weight: 600;
        font-size: 13px;
      }
      .monthHeader .meta {
        color: var(--muted);
        font-size: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th,
      td {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 8px 6px;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 11px;
        text-align: center;
      }
      td {
        height: 54px;
      }
      td.free {
        outline: 1px solid rgba(31, 157, 85, 0.6);
      }
      td.booked {
        outline: 1px solid rgba(214, 69, 69, 0.6);
        background: rgba(214, 69, 69, 0.08);
      }
      .cell {
        display: grid;
        gap: 4px;
        justify-items: center;
        font-size: 12px;
      }
      .badge {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .badge.ok {
        color: #ffffff;
        border-color: rgba(31, 157, 85, 0.9);
        background: rgba(31, 157, 85, 0.85);
      }
      .badge.bad {
        color: #ffffff;
        border-color: rgba(214, 69, 69, 0.9);
        background: rgba(214, 69, 69, 0.9);
      }
      .price {
        font-size: 11px;
        color: var(--muted);
      }
      .empty {
        color: rgba(255, 255, 255, 0.06);
      }
      .footerNote {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
      }
      .error {
        margin-top: 12px;
        color: #ffc3c3;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Availability tracker</h1>

      <div class="panel">
        <div class="controls">
          <div>
            <label for="snapshot">Snapshot (as of)</label>
            <select id="snapshot"></select>
          </div>
          <div>
            <label for="apartment">Apartment</label>
            <select id="apartment"></select>
          </div>
          <div>
            <label for="from">From</label>
            <input id="from" type="date" />
          </div>
          <div>
            <label for="to">To</label>
            <input id="to" type="date" />
          </div>
        </div>
        <div style="margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
          <button id="apply">Apply</button>
          <button id="reset">Reset range</button>
        </div>
        <div id="error" class="error" style="display: none"></div>
      </div>

      <div id="months" class="grid"></div>

      <div class="footerNote">
        Available days are inferred from presence of a price (e.g. “82 EUR”). Unavailable/booked days typically show
        only the day number.
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
